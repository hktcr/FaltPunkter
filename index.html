<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FältPunkter — Positioner</title>
<meta name="description" content="Verktyg för geografiska punkter, avstånd och listor">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:rgba(10,12,18,.96);--surface2:rgba(20,24,36,.95);
  --border:rgba(255,255,255,.08);--border-light:rgba(255,255,255,.04);
  --text:#b8bfcc;--text-bright:#f0f2f6;--text-dim:#4a5268;
  --accent:#3b82f6;--accent-glow:rgba(59,130,246,.15);
  --cyan:#2ee8c8;--cyan-glow:rgba(46,232,200,.12);
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
html,body{height:100%;overflow:hidden;touch-action:manipulation;background:#000;font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

.map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%;z-index:1}
.leaflet-control-zoom{display:none!important}

/* RIGHT CONTROL STACK — single flex column to prevent overlap */
.right-controls{position:absolute;top:10px;right:10px;z-index:1000;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none}
.right-controls>*{pointer-events:auto}

.layers{display:flex;gap:3px}
.layer-pill{padding:10px 16px;border:none;border-radius:20px;background:var(--surface);color:var(--text-dim);font-family:var(--sans);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.06em;backdrop-filter:blur(16px);box-shadow:0 2px 12px rgba(0,0,0,.5)}
.layer-pill.active{background:var(--accent);color:#fff;box-shadow:0 2px 16px rgba(59,130,246,.4)}

.crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:800;pointer-events:none;width:60px;height:60px}
.ch-ring{position:absolute;inset:8px;border:1.5px solid rgba(255,255,255,.25);border-radius:50%}
.ch-v{position:absolute;width:1px;height:100%;left:50%;background:linear-gradient(rgba(255,255,255,0),rgba(255,255,255,.4) 30%,rgba(255,255,255,0) 45%,rgba(255,255,255,0) 55%,rgba(255,255,255,.4) 70%,rgba(255,255,255,0))}
.ch-h{position:absolute;height:1px;width:100%;top:50%;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.4) 30%,rgba(255,255,255,0) 45%,rgba(255,255,255,0) 55%,rgba(255,255,255,.4) 70%,rgba(255,255,255,0))}
.ch-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--cyan);left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px var(--cyan)}

.gps-badge{position:absolute;top:10px;left:10px;z-index:1000;display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--surface);border-radius:24px;backdrop-filter:blur(16px);box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer;transition:all .2s;border:1px solid transparent}
.gps-badge.tracking{border-color:var(--cyan)}
.gps-text{font-size:.8rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.gps-badge.tracking .gps-text{color:var(--cyan)}
.gps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gps-dot.off{background:var(--text-dim)}
.gps-dot.good{background:var(--green);box-shadow:0 0 6px var(--green)}
.gps-dot.ok{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.gps-dot.poor{background:var(--red);box-shadow:0 0 6px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.gps-badge.searching .gps-dot{animation:pulse 1.2s infinite}

.center-btn{width:48px;height:48px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;backdrop-filter:blur(16px);box-shadow:0 2px 12px rgba(0,0,0,.5);transition:all .2s}
.center-btn:active{transform:scale(.92);background:var(--accent);color:#fff}

.zoom-btns{display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:44px;height:44px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:1.3rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(16px);transition:all .15s}
.zoom-btn:active{background:var(--surface2);transform:scale(.92)}

/* COORDINATE PANEL */
.coord-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:1000;
  background:linear-gradient(0deg,rgba(0,0,0,1) 30%,rgba(6,8,14,.92));
  padding:16px 16px max(16px, env(safe-area-inset-bottom));
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
}

.coord-source{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.source-pill{padding:8px 12px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:var(--sans);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.source-pill.active{background:var(--cyan-glow);color:var(--cyan);border-color:rgba(46,232,200,.3)}
.source-spacer{flex:1}
.acc-tag{font-size:.7rem;font-weight:700;color:var(--text-dim);padding:6px 10px;border-radius:12px;background:rgba(255,255,255,.04)}
.acc-tag .val{font-family:var(--mono)}
.acc-tag.good .val{color:var(--green)}
.acc-tag.ok .val{color:var(--orange)}
.acc-tag.poor .val{color:var(--red)}
.astorp-badge{font-size:.7rem;font-weight:800;color:#fff;background:var(--accent);padding:6px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em}
.astorp-badge.out{background:rgba(255,255,255,.05);color:var(--text-dim)}
.ruta-badge{font-size:.75rem;font-weight:800;color:#fff;background:rgba(168,85,247,.8);padding:6px 12px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em;border:1px solid rgba(168,85,247,.4);display:flex;align-items:center;gap:6px}
.ruta-badge.out{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid transparent;display:flex;align-items:center;gap:6px}
.ruta-badge.selected{background:var(--surface2);color:var(--text-bright);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:6px}
.ruta-badge #rutaVal{font-size:1.1rem;font-family:var(--mono)}

.coords-block{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;gap:12px}
.coords-left{flex:1;display:flex;flex-direction:column;gap:6px}
.coord-row{display:flex;align-items:center;gap:8px}
.c-label{font-size:.7rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;width:18px}
.c-digits{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--text-bright);letter-spacing:.02em;line-height:1}
.c-digits .int{color:var(--text-bright)}
.c-digits .dot{color:var(--text-dim)}
.c-digits .dec{color:var(--cyan)}
.c-digits.warn .dec{color:var(--orange);opacity:.7}
.c-digits.warn .int{opacity:.8}

.save-btn{height:56px;padding:0 24px;border-radius:16px;border:none;background:var(--green);color:#fff;font-family:var(--sans);font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(16,185,129,.3)}
.save-btn:active{transform:scale(.95)}

.list-btn{width:100%;height:52px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text-bright);font-family:var(--sans);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.list-btn:hover{background:rgba(255,255,255,.04)}
.list-btn:active{transform:scale(.98)}
.list-count{background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:.8rem;font-weight:800}

/* LIST DRAWER */
.drawer{position:absolute;bottom:0;left:0;right:0;height:85vh;background:#000;z-index:2000;border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,.12);transform:translateY(100%);transition:transform .3s cubic-bezier(.17,.84,.44,1);display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.8)}
.drawer.open{transform:translateY(0)}
.dr-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.dr-title{font-size:1.1rem;font-weight:800;color:#fff}
.dr-close{background:var(--surface2);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dr-sort{display:flex;gap:6px;padding:12px 20px;background:var(--surface)}
.sort-btn{flex:1;padding:8px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s}
.sort-btn.active{background:var(--accent-glow);color:var(--accent);border-color:var(--accent)}

.dr-list{flex:1;overflow-y:auto;padding:12px;background:#000;display:flex;flex-direction:column;gap:12px}
.pt-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:all .2s}
.pt-card:active{transform:scale(.98)}
.pt-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.pt-name{font-size:1.1rem;font-weight:800;color:var(--text-bright);word-break:break-word}
.pt-dist{background:var(--cyan-glow);color:var(--cyan);font-family:var(--mono);font-size:.85rem;font-weight:700;padding:4px 10px;border-radius:12px;white-space:nowrap;display:flex;align-items:center;gap:4px}
.pt-info{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.pt-coords{font-family:var(--mono);font-size:.8rem;color:var(--text-dim)}
.pt-tag{font-size:.7rem;font-weight:700;color:var(--purple);background:rgba(168,85,247,.1);padding:4px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em}

.pt-actions{display:flex;gap:8px;margin-top:4px}
.pt-btn{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:.8rem;font-weight:700;cursor:pointer}
.pt-btn.nav{color:var(--accent);border-color:rgba(59,130,246,.3)}
.pt-btn.del{color:var(--red);border-color:rgba(239,68,68,.3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.modal-overlay.visible{display:flex;animation:fade .2s}
.modal{background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:500px;animation:slideUp .25s ease;box-shadow:0 -10px 40px rgba(0,0,0,.8)}
.modal.center{border-radius:24px;align-self:center;margin:20px;border:1px solid var(--border)}
.modal h3{font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.form-group input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:#000;color:#fff;font-family:var(--sans);font-size:1rem;outline:none}
.form-group input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.modal-actions button{flex:1;padding:16px;border-radius:16px;font-family:var(--sans);font-size:1rem;font-weight:800;cursor:pointer;border:none}
.btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border)!important}
.btn-save{background:var(--green);color:#fff}

@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}

.toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(.9);z-index:4000;background:var(--surface);color:#fff;padding:16px 28px;border-radius:18px;font-family:var(--sans);font-size:1.1rem;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.8);border:1px solid var(--border);backdrop-filter:blur(24px)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-weight:600}
.empty-state span{font-size:3rem;display:block;margin-bottom:12px;opacity:.5}

/* GRID OVERLAY */
.overlay-pills{display:flex;gap:6px;flex-wrap:wrap}
.overlay-pill{padding:8px 14px;border:none;border-radius:14px;background:rgba(255,255,255,.06);color:var(--text-dim);font-family:var(--sans);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--border)}
.overlay-pill.active{background:rgba(168,85,247,.2);color:var(--purple);border-color:rgba(168,85,247,.4)}
.overlay-pill.rook-pill{display:none}
.overlay-pill.rook-pill.visible{display:block}
.overlay-pill.rook-pill.active{background:rgba(16,185,129,.15);color:var(--green);border-color:rgba(16,185,129,.35)}

.grid-popup{font-family:var(--sans);font-size:.85rem;line-height:1.5}
.grid-popup .gp-id{font-family:var(--mono);font-size:1.1rem;font-weight:800;color:#4f46e5;margin-bottom:4px}
.grid-popup .gp-coord{font-family:var(--mono);font-size:.8rem;color:#475569}
.grid-popup .gp-status{margin-top:6px;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
.grid-popup .gp-status.nest{color:#059669}
.grid-popup .gp-status.empty{color:#94a3b8}
.grid-popup .gp-status.recheck{color:#f59e0b}
.grid-popup .gp-group{font-size:.8rem;color:#059669;margin-top:2px}

/* KPI strip — inline in coord-panel */
.kpi-strip-inline{display:none;align-items:center;gap:12px;padding:8px 0}
.kpi-strip-inline.visible{display:flex}
.kpi-label-ov{font-size:.72rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.kpi-val-ov{font-family:var(--mono);font-size:1rem;font-weight:800;color:var(--cyan)}
.kpi-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;max-width:120px}
.kpi-bar-fill{height:100%;background:var(--cyan);border-radius:3px;transition:width .4s}

@media (max-width:360px){
  .layer-pill{padding:8px 10px;font-size:.7rem}
  .overlay-pill{padding:6px 10px;font-size:.68rem}
  .center-btn{width:40px;height:40px;font-size:1.1rem}
  .zoom-btn{width:38px;height:38px;font-size:1.1rem}
  .kpi-val-ov{font-size:.85rem}
}

/* Pulsating GPS Marker */
.gps-pulse-wrapper { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
.gps-pulse-inner { 
  width: 16px; height: 16px; 
  background: var(--accent); 
  border: 2px solid #fff; 
  border-radius: 50%; 
  box-shadow: 0 0 8px rgba(0,0,0,0.5); 
  z-index: 2; 
  animation: gps-color-pulse 2s infinite ease-in-out; 
}
.gps-pulse-ring { 
  position: absolute; 
  width: 16px; height: 16px; 
  border: 3px solid var(--accent); 
  border-radius: 50%; 
  z-index: 1; 
  animation: gps-ring-pulse 2s infinite ease-out; 
  pointer-events: none; 
}
@keyframes gps-ring-pulse { 
  0% { transform: scale(1); opacity: 0.8; } 
  100% { transform: scale(4); opacity: 0; } 
}
@keyframes gps-color-pulse { 
  0%, 100% { background-color: #1d4ed8; } /* djupblå */
  50% { background-color: #60a5fa; }    /* ljusblå */
}
</style>
</head>
<body>

<div class="map-wrap">
  <div id="map"></div>
  <div class="crosshair"><div class="ch-ring"></div><div class="ch-v"></div><div class="ch-h"></div><div class="ch-dot"></div></div>
  <div class="gps-badge" id="gpsBadge" onclick="toggleGPS()"><div class="gps-dot off" id="gpsDot"></div><span class="gps-text" id="gpsText">GPS av</span></div>
  <div class="right-controls">
    <div class="layers">
      <button class="layer-pill active" data-layer="street">Karta</button>
      <button class="layer-pill" data-layer="topowebb">Grön</button>
      <button class="layer-pill" data-layer="terrain">Terr</button>
      <button class="layer-pill" data-layer="satellite">Sat</button>
    </div>
    <button class="center-btn" onclick="centerOnGPS()" title="Centrera">🎯</button>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="map.zoomIn()">+</button>
      <button class="zoom-btn" onclick="map.zoomOut()">−</button>
    </div>
  </div>

  <div class="coord-panel">
    <div class="coord-source">
      <button class="source-pill active" data-mode="center" onclick="setSource('center')">⊕ Karta</button>
      <button class="source-pill" data-mode="gps" onclick="setSource('gps')">📡 GPS</button>
      <button class="source-pill" data-mode="tap" onclick="setSource('tap')">👆 Tryck</button>
      <div class="overlay-pills" style="margin-left: auto;">
        <button class="overlay-pill" id="btnGrid" onclick="toggleGrid()">▦ Rutnät</button>
        <button class="overlay-pill" id="btnCurrentRuta" onclick="toggleCurrentRuta()">▢ Ruta</button>
        <button class="overlay-pill rook-pill" id="btnRook" onclick="toggleRookOverlay()">🐦 Råkor</button>
      </div>
    </div>
    <div class="kpi-strip-inline" id="kpiOverlay">
      <span class="kpi-label-ov">Inventerat</span>
      <span class="kpi-val-ov" id="kpiVal">0/0</span>
      <div class="kpi-bar"><div class="kpi-bar-fill" id="kpiBar" style="width:0%"></div></div>
      <span class="kpi-label-ov" id="kpiPct">0%</span>
    </div>
    <div class="coord-source" style="margin-bottom:0;padding-top:0">
      <div class="astorp-badge" id="astorpBadge" style="display:none">📍 ÅSTORP</div>
      <div class="ruta-badge" id="rutaBadge" style="display:none">▢ <span id="rutaVal">-</span></div>
      <div class="acc-tag" id="accTag" style="display:none">±<span class="val" id="accVal">?</span>m</div>
    </div>
    
    <div class="coords-block">
      <div class="coords-left">
        <div class="coord-row"><span class="c-label">N</span><span class="c-digits" id="latDigits"><span class="int">56</span><span class="dot">.</span><span class="dec">13090</span></span></div>
        <div class="coord-row"><span class="c-label">E</span><span class="c-digits" id="lngDigits"><span class="int">12</span><span class="dot">.</span><span class="dec">99170</span></span></div>
      </div>
      <button class="save-btn" onclick="openSaveModal()">
        <span>Spara</span>
        <span style="font-size:1.2rem">📌</span>
      </button>
    </div>

    <button class="list-btn" onclick="openDrawer()">
      <span>Visa positioner</span>
      <span class="list-count" id="btnCount">0</span>
    </button>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer" id="listDrawer">
  <div class="dr-header">
    <div class="dr-title">Sparade positioner (<span id="drCount">0</span>)</div>
    <button class="dr-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="dr-sort">
    <button class="sort-btn active" id="sortTime" onclick="setSort('time')">Senaste först</button>
    <button class="sort-btn" id="sortDist" onclick="setSort('dist')">Närmast först</button>
  </div>
  <div class="dr-list" id="pointList">
    <!-- Items go here -->
  </div>
  <div style="padding:16px; border-top:1px solid var(--border)">
    <button class="list-btn" onclick="exportTSV()" style="color:var(--accent);border-color:var(--border)">📥 Exportera data (TSV)</button>
  </div>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="saveModalOverlay">
  <div class="modal center">
    <h3>Spara Position</h3>
    <div class="form-group">
      <label>Namn på plats / beskrivning</label>
      <input type="text" id="ptName" placeholder="T.ex. Klippan, Träd A...">
    </div>
    <div class="form-group">
      <label>Valfri Tagg (kategori)</label>
      <input type="text" id="ptTag" placeholder="T.ex. Inventering 2026">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSaveModal()">Avbryt</button>
      <button class="btn-save" onclick="savePoint()">Spara punkt</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// CONSTANTS
const DEFAULT_CENTER = [56.1309, 12.9917];
let astorpBoundary = null;

// STATE
let source = 'center';
let gpsOn = false;
let gpsWatchId = null;
let gpsPos = null;
let gpsAcc = null;
let tapPos = null;
let points = [];
let sortBy = 'time'; // 'time' | 'dist'
let currentRutaVisible = false;
let currentRutaCache = { id: null, lat: null, lng: null };
let selectedRutaId = null;
let waitingForGPSCenter = false;

// MAP
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(DEFAULT_CENTER, 14);

const tiles = {
  street: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }),
  topowebb: L.tileLayer('https://minkarta.lantmateriet.se/map/topowebbcache/?layer=topowebb&style=default&tilematrixset=3857&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { 
    maxZoom: 15, 
    attribution: '&copy; <a href="https://www.lantmateriet.se/en/">Lantmäteriet</a>' 
  }),
  terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 })
};
tiles.street.addTo(map);

document.querySelectorAll('.layer-pill').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.layer-pill').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    Object.values(tiles).forEach(t => map.removeLayer(t));
    tiles[this.dataset.layer].addTo(map);
  });
});

fetch('astorp.geojson')
  .then(res => res.json())
  .then(data => {
    astorpBoundary = data;
    L.geoJSON(astorpBoundary, {
      style: { color: 'rgba(59,130,246,0.9)', weight: 3, fillColor: 'rgba(59,130,246,0.05)', fillOpacity: 1, dashArray: '4,4' },
      interactive: false
    }).addTo(map);
    updateDisplay();
  })
  .catch(err => console.error("Kunde inte ladda kommungräns:", err));

L.control.scale({ position: 'bottomleft', imperial: false, maxWidth: 120 }).addTo(map);
setTimeout(() => {
  const scale = document.querySelector('.leaflet-control-scale');
  if(scale) { scale.style.marginBottom = '180px'; scale.style.marginLeft = '12px'; }
}, 500);

let gpsMarker = null;
let gpsCircle = null;
let tapMarker = null;
let pointLayer = L.layerGroup().addTo(map);

// LOAD POINTS
function loadPoints() {
  try {
    const data = localStorage.getItem('faltpunkter_db');
    if (data) points = JSON.parse(data);
  } catch (e) { console.error("Could not load points", e); }
  updateUI();
}

function persistPoints() {
  localStorage.setItem('faltpunkter_db', JSON.stringify(points));
  updateUI();
}

// COORD DISPLAY
function fmt(val) {
  const s = val.toFixed(5);
  const parts = s.split('.');
  return { int: parts[0], dec: parts[1] };
}

function getCurrentCoords() {
  if (source === 'gps' && gpsPos) return gpsPos;
  if (source === 'tap' && tapPos) return tapPos;
  const c = map.getCenter();
  return [c.lat, c.lng];
}

function updateCrosshairCoords() {
  let lat, lng, warn = false;
  if (source === 'gps') {
    if (gpsPos) { lat = gpsPos[0]; lng = gpsPos[1]; warn = gpsAcc > 30; }
    else { lat = 0; lng = 0; warn = true; }
  } else if (source === 'tap') {
    if (tapPos) { lat = tapPos[0]; lng = tapPos[1]; }
    else { const c = map.getCenter(); lat = c.lat; lng = c.lng; }
  } else {
    const c = map.getCenter();
    lat = c.lat; lng = c.lng;
  }

  const la = fmt(lat), lo = fmt(lng);
  const warnClass = warn ? ' warn' : '';
  document.getElementById('latDigits').className = 'c-digits' + warnClass;
  document.getElementById('latDigits').innerHTML = `<span class="int">${la.int}</span><span class="dot">.</span><span class="dec">${la.dec}</span>`;
  document.getElementById('lngDigits').className = 'c-digits' + warnClass;
  document.getElementById('lngDigits').innerHTML = `<span class="int">${lo.int}</span><span class="dot">.</span><span class="dec">${lo.dec}</span>`;
}

function updateContextBadges() {
  let lat, lng;
  if (source === 'gps') {
    if (gpsPos) { lat = gpsPos[0]; lng = gpsPos[1]; }
    else { lat = 0; lng = 0; }
  } else if (source === 'tap') {
    if (tapPos) { lat = tapPos[0]; lng = tapPos[1]; }
    else { const c = map.getCenter(); lat = c.lat; lng = c.lng; }
  } else {
    const c = map.getCenter();
    lat = c.lat; lng = c.lng;
  }

  const astBadge = document.getElementById('astorpBadge');
  if(astBadge) {
    const inAstorp = isPointInAstorp(lat, lng);
    if (inAstorp) {
      astBadge.style.display = '';
      astBadge.className = 'astorp-badge';
      astBadge.textContent = '📍 Åstorp';
    } else {
      astBadge.style.display = '';
      astBadge.className = 'astorp-badge out';
      astBadge.textContent = 'Utanför';
    }
  }

  if (currentRutaVisible) {
    const currentId = getCurrentRuta(lat, lng);
    const displayId = selectedRutaId || currentId;
    const rutaBadge = document.getElementById('rutaBadge');
    if (rutaBadge) {
      rutaBadge.style.display = '';
      if (displayId) {
        document.getElementById('rutaVal').textContent = displayId;
        if (selectedRutaId) {
          rutaBadge.className = 'ruta-badge selected';
        } else {
          rutaBadge.className = 'ruta-badge';
        }
      } else {
        document.getElementById('rutaVal').textContent = '-';
        rutaBadge.className = 'ruta-badge out';
      }
    }
  } else {
    const rutaBadge = document.getElementById('rutaBadge');
    if (rutaBadge) rutaBadge.style.display = 'none';
  }
}

function updateDisplay() {
  updateCrosshairCoords();
  updateContextBadges();
}

function isPointInAstorp(lat, lng) {
  if (!astorpBoundary || typeof turf === 'undefined') return false;
  try {
    const pt = turf.point([lng, lat]);
    return turf.booleanPointInPolygon(pt, astorpBoundary);
  } catch (e) { return false; }
}

map.on('dragstart', () => { if (source === 'gps') setSource('center'); });
map.on('move', () => { if (source === 'center') updateCrosshairCoords(); });
map.on('moveend', () => { if (source === 'center') updateContextBadges(); });

map.on('click', function(e) {
  if (selectedRutaId) {
    selectedRutaId = null;
    updateDisplay();
  }
  tapPos = [e.latlng.lat, e.latlng.lng];
  if (tapMarker) map.removeLayer(tapMarker);
  tapMarker = L.circleMarker(e.latlng, {
    radius: 12, color: '#a855f7', fillColor: '#a855f7', fillOpacity: 0.25, weight: 2.5
  }).addTo(map);
  setSource('tap');
  setTimeout(() => { if (tapMarker) { map.removeLayer(tapMarker); tapMarker = null; } }, 60000);
});

function setSource(mode) {
  source = mode;
  document.querySelectorAll('.source-pill').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  if (mode === 'gps' && !gpsOn) toggleGPS();
  updateDisplay();
}

// GPS
function toggleGPS() {
  const badge = document.getElementById('gpsBadge');
  const dot = document.getElementById('gpsDot');
  const txt = document.getElementById('gpsText');

  if (gpsOn) {
    if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
    gpsOn = false; gpsWatchId = null; gpsPos = null; gpsAcc = null;
    badge.className = 'gps-badge';
    dot.className = 'gps-dot off';
    txt.textContent = 'GPS av';
    document.getElementById('accTag').style.display = 'none';
    if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
    if (gpsCircle) { map.removeLayer(gpsCircle); gpsCircle = null; }
    if (source === 'gps') setSource('center');
    renderList(); // Refresh distances (remove)
    return;
  }

  if (!navigator.geolocation) { toast('Ingen GPS'); return; }
  gpsOn = true;
  badge.className = 'gps-badge tracking searching';
  dot.className = 'gps-dot ok';
  txt.textContent = 'Söker...';

  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    gpsPos = [pos.coords.latitude, pos.coords.longitude];
    gpsAcc = pos.coords.accuracy;

    if (waitingForGPSCenter) {
      map.setView(gpsPos, Math.max(map.getZoom(), 17));
      waitingForGPSCenter = false;
    }

    if (gpsMarker) map.removeLayer(gpsMarker);
    const pulseIcon = L.divIcon({
      className: '',
      html: '<div class="gps-pulse-wrapper"><div class="gps-pulse-ring"></div><div class="gps-pulse-inner"></div></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    gpsMarker = L.marker(gpsPos, { icon: pulseIcon }).addTo(map);

    if (gpsCircle) map.removeLayer(gpsCircle);
    gpsCircle = L.circle(gpsPos, {
      radius: gpsAcc, color: 'rgba(46,232,200,.35)', fillColor: 'rgba(46,232,200,.08)',
      fillOpacity: 1, weight: 1, dashArray: '4,4'
    }).addTo(map);

    badge.className = 'gps-badge tracking';
    const q = gpsAcc < 10 ? 'good' : gpsAcc < 30 ? 'ok' : 'poor';
    dot.className = 'gps-dot ' + q;
    txt.textContent = `±${Math.round(gpsAcc)}m`;

    const tag = document.getElementById('accTag');
    tag.style.display = '';
    tag.className = 'acc-tag ' + q;
    document.getElementById('accVal').textContent = Math.round(gpsAcc);

    if (source === 'gps') updateDisplay();
    renderList(); // Live distance update
  }, err => {
    toast('GPS-fel');
    toggleGPS();
  }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 3000 });
}

function centerOnGPS() {
  if (gpsPos) { 
    map.setView(gpsPos, Math.max(map.getZoom(), 17)); 
    waitingForGPSCenter = false;
  } else { 
    if (!gpsOn) toggleGPS(); 
    toast('Söker GPS...'); 
    waitingForGPSCenter = true;
  }
}

// HAVERSINE DISTANCE
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371e3; 
  const p1 = lat1 * Math.PI/180;
  const p2 = lat2 * Math.PI/180;
  const dp = (lat2-lat1) * Math.PI/180;
  const dl = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dp/2)**2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function getDistances(pts) {
  const refPos = gpsOn && gpsPos ? gpsPos : [map.getCenter().lat, map.getCenter().lng];
  return pts.map(p => {
    const dist = haversine(refPos[0], refPos[1], p.lat, p.lng);
    return { ...p, dist };
  });
}

function formatDist(m) {
  if (m < 1000) return Math.round(m) + " m";
  return (m / 1000).toFixed(1) + " km";
}

// SAVE LOGIC
function openSaveModal() {
  document.getElementById('ptName').value = '';
  document.getElementById('ptTag').value = '';
  document.getElementById('saveModalOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('ptName').focus(), 100);
}

function closeSaveModal() {
  document.getElementById('saveModalOverlay').classList.remove('visible');
}

function savePoint() {
  const name = document.getElementById('ptName').value.trim() || 'Namnlös Punkt';
  const tag = document.getElementById('ptTag').value.trim();
  const coords = getCurrentCoords();
  
  const pt = {
    id: Date.now().toString(),
    name,
    tag,
    lat: coords[0],
    lng: coords[1],
    date: new Date().toISOString()
  };
  
  points.push(pt);
  persistPoints();
  closeSaveModal();
  toast('📍 Position sparad');
  
  // Render marker
  renderMarkers();
}

// RENDER MAP MARKERS
function renderMarkers() {
  pointLayer.clearLayers();
  points.forEach(p => {
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 8, color: '#fff', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 1.5
    }).bindPopup(`<b>${p.name}</b><br>${p.tag ? `<span class="pt-tag">${p.tag}</span>` : ''}`);
    pointLayer.addLayer(marker);
  });
}

// LIST DRAWER
function openDrawer() {
  document.getElementById('listDrawer').classList.add('open');
  renderList();
}
function closeDrawer() {
  document.getElementById('listDrawer').classList.remove('open');
}

function setSort(mode) {
  sortBy = mode;
  document.getElementById('sortTime').classList.toggle('active', mode === 'time');
  document.getElementById('sortDist').classList.toggle('active', mode === 'dist');
  renderList();
}

function renderList() {
  const listEl = document.getElementById('pointList');
  if (points.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><span>📭</span>Inga sparade positioner ännu.<br>Använd "Spara"-knappen för att bygga din lista.</div>`;
    return;
  }

  let items = getDistances(points);

  if (sortBy === 'time') {
    items.sort((a,b) => b.id.localeCompare(a.id)); // newest first
  } else {
    items.sort((a,b) => a.dist - b.dist); // closest first
  }

  const isGpsStr = (gpsOn && gpsPos) ? '📍' : '🎯 Karta';

  let html = '';
  items.forEach(p => {
    html += `
      <div class="pt-card">
        <div class="pt-header">
          <div class="pt-name">${p.name}</div>
          <div class="pt-dist" title="Avstånd från ${isGpsStr}">⛕ ${formatDist(p.dist)}</div>
        </div>
        <div class="pt-info">
          <div class="pt-coords">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div>
          ${p.tag ? `<div class="pt-tag">${p.tag}</div>` : ''}
        </div>
        <div class="pt-actions">
          <button class="pt-btn nav" onclick="navTo('${p.id}')">Visa på karta</button>
          <button class="pt-btn del" onclick="delPoint('${p.id}')">Radera</button>
        </div>
      </div>
    `;
  });
  listEl.innerHTML = html;
}

function navTo(id) {
  const p = points.find(x => x.id === id);
  if (p) {
    map.setView([p.lat, p.lng], 17);
    closeDrawer();
  }
}

function delPoint(id) {
  if(confirm('Är du säker på att du vill radera denna position?')) {
    points = points.filter(x => x.id !== id);
    persistPoints();
    if(document.getElementById('listDrawer').classList.contains('open')) renderList();
    renderMarkers();
    toast('Position raderad');
  }
}

function updateUI() {
  document.getElementById('btnCount').textContent = points.length;
  document.getElementById('drCount').textContent = points.length;
  renderMarkers();
}

function exportTSV() {
  if(points.length === 0) return toast('Inget att exportera');
  let tsv = "Namn\tTagg\tLatitud\tLongitud\tDatum\n";
  points.forEach(p => {
    tsv += `${p.name}\t${p.tag||''}\t${p.lat}\t${p.lng}\t${p.date}\n`;
  });
  const blob = new Blob([tsv], { type: 'text/tab-separated-values' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Faltpunkter_Export_${new Date().toISOString().slice(0,10)}.tsv`;
  a.click();
}

// TOAST
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// INIT
loadPoints();
updateDisplay();

// ========== GRID OVERLAY ==========
let gridData = null;
let gridLayer = null;
let gridCentroids = {}; // { gridId: [lat, lng] }
let gridVisible = false;
let rookData = null;
let rookVisible = false;
let rookLayer = null;

const GRID_URLS = ['data/astorp-grid-250m.geojson', '../../Deployments/gaia-tools/rakor/data/astorp-grid-250m.geojson'];
const ROOK_URLS = ['data/rakobservations.json', '../../Deployments/gaia-tools/rakor/data/rakobservations.json'];

async function tryFetch(urls) {
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (res.ok) return await res.json();
    } catch (e) { /* try next */ }
  }
  return null;
}

function getCurrentRuta(lat, lng) {
  if (!gridData || typeof turf === 'undefined') return null;
  // fast path
  if (currentRutaCache.id && currentRutaCache.lat !== null) {
     const d = haversine(currentRutaCache.lat, currentRutaCache.lng, lat, lng);
     if (d < 10) return currentRutaCache.id;
  }
  
  const pt = turf.point([lng, lat]);
  if (currentRutaCache.id) {
     const prevFeat = gridData.features.find(f => f.properties.gridId === currentRutaCache.id);
     if (prevFeat && turf.booleanPointInPolygon(pt, prevFeat)) {
         currentRutaCache.lat = lat;
         currentRutaCache.lng = lng;
         return currentRutaCache.id;
     }
  }

  for (let i = 0; i < gridData.features.length; i++) {
    const f = gridData.features[i];
    if (turf.booleanPointInPolygon(pt, f)) {
      currentRutaCache.id = f.properties.gridId;
      currentRutaCache.lat = lat;
      currentRutaCache.lng = lng;
      return currentRutaCache.id;
    }
  }
  
  currentRutaCache.id = null;
  return null;
}

async function toggleCurrentRuta() {
  const btn = document.getElementById('btnCurrentRuta');
  if (currentRutaVisible) {
    currentRutaVisible = false;
    btn.classList.remove('active');
    updateDisplay();
    return;
  }
  
  btn.textContent = '⏳';
  const data = await loadGridData();
  if (!data) { btn.textContent = '▢ Ruta'; return; }
  
  currentRutaVisible = true;
  btn.classList.add('active');
  btn.textContent = '▢ Ruta';
  updateDisplay();
}

async function loadGridData() {
  if (gridData) return gridData;
  gridData = await tryFetch(GRID_URLS);
  if (gridData) {
    computeCentroids();
    return gridData;
  }
  toast('❌ Kunde inte ladda rutnätet');
  return null;
}

function computeCentroids() {
  if (!gridData || !astorpBoundary) return;
  gridData.features.forEach(f => {
    const id = f.properties.gridId;
    const coords = f.geometry.coordinates[0];
    // Geometric center
    const cx = (coords[0][0] + coords[2][0]) / 2;
    const cy = (coords[0][1] + coords[2][1]) / 2;
    
    if (isPointInAstorp(cy, cx)) {
      gridCentroids[id] = [cy, cx];
    } else {
      // Find nearest point on municipality boundary that's inside
      try {
        const pt = turf.point([cx, cy]);
        // Get boundary as a line
        const geom = astorpBoundary.features ? astorpBoundary.features[0].geometry : astorpBoundary.geometry;
        let line;
        if (geom.type === 'Polygon') {
          line = turf.polygonToLine(turf.polygon(geom.coordinates));
        } else if (geom.type === 'MultiPolygon') {
          line = turf.polygonToLine(turf.multiPolygon(geom.coordinates));
        }
        if (line) {
          const snapped = turf.nearestPointOnLine(line.type === 'FeatureCollection' ? line.features[0] : line, pt);
          gridCentroids[id] = [snapped.geometry.coordinates[1], snapped.geometry.coordinates[0]];
        } else {
          gridCentroids[id] = [cy, cx]; // fallback
        }
      } catch (e) {
        gridCentroids[id] = [cy, cx]; // fallback
      }
    }
  });
}

async function toggleGrid() {
  const btn = document.getElementById('btnGrid');
  const rookBtn = document.getElementById('btnRook');
  
  if (gridVisible) {
    // Turn off
    if (gridLayer) { map.removeLayer(gridLayer); gridLayer = null; }
    if (rookLayer) { map.removeLayer(rookLayer); rookLayer = null; }
    gridVisible = false;
    rookVisible = false;
    btn.classList.remove('active');
    rookBtn.classList.remove('active', 'visible');
    document.getElementById('kpiOverlay').classList.remove('visible');
    return;
  }
  
  btn.textContent = '⏳ Laddar...';
  const data = await loadGridData();
  if (!data) { btn.textContent = '▦ Rutnät'; return; }
  
  gridVisible = true;
  btn.classList.add('active');
  btn.textContent = '▦ Rutnät';
  rookBtn.classList.add('visible');
  
  renderGrid();
}

function renderGrid() {
  if (gridLayer) map.removeLayer(gridLayer);
  
  gridLayer = L.geoJSON(gridData, {
    style: function(feature) {
      const id = feature.properties.gridId;
      const isSelected = (id === selectedRutaId);
      return {
        color: isSelected ? '#3b82f6' : 'rgba(168, 85, 247, 0.5)',
        weight: isSelected ? 3 : 1,
        dashArray: isSelected ? '6,6' : null,
        fillColor: 'rgba(168, 85, 247, 0.06)',
        fillOpacity: 1,
        interactive: true
      };
    },
    onEachFeature: function(feature, layer) {
      layer.on('click', function(e) {
        L.DomEvent.stopPropagation(e);
        const id = feature.properties.gridId;
        const currentCoords = getCurrentCoords();
        const currentId = getCurrentRuta(currentCoords[0], currentCoords[1]);
        
        if (id === currentId || selectedRutaId === id) {
          selectedRutaId = null;
        } else {
          selectedRutaId = id;
          if (!currentRutaVisible) toggleCurrentRuta();
        }
        updateDisplay();
        refreshGridStyles();
      });
    }
  }).addTo(map);
}

async function loadRookData() {
  if (rookData) return rookData;
  rookData = await tryFetch(ROOK_URLS);
  if (rookData) return rookData;
  toast('❌ Kunde inte ladda råkdata');
  return null;
}

async function toggleRookOverlay() {
  const btn = document.getElementById('btnRook');
  
  if (rookVisible) {
    rookVisible = false;
    btn.classList.remove('active');
    document.getElementById('kpiOverlay').classList.remove('visible');
    // Reset grid colors
    if (gridLayer) renderGrid();
    return;
  }
  
  const data = await loadRookData();
  if (!data || !gridData) return;
  
  rookVisible = true;
  btn.classList.add('active');
  
  renderRookOverlay();
  updateKPI();
}

function renderRookOverlay() {
  if (!gridData || !rookData) return;
  if (gridLayer) map.removeLayer(gridLayer);
  
  gridLayer = L.geoJSON(gridData, {
    style: function(feature) {
      const id = feature.properties.gridId;
      const isSelected = (id === selectedRutaId);
      const info = rookData.grids ? rookData.grids[id] : null;
      
      let baseColor, baseWeight = 1, baseFill, baseOpac = 1;
      
      if (info && info.status === 'nest') {
        baseColor = 'rgba(16, 185, 129, 0.8)';
        baseWeight = 2;
        baseFill = 'rgba(16, 185, 129, 0.35)';
      } else if (info && info.status === 'recheck') {
        baseColor = 'rgba(245, 158, 11, 0.8)';
        baseWeight = 2;
        baseFill = 'rgba(245, 158, 11, 0.3)';
      } else if (info && info.status === 'empty') {
        baseColor = 'rgba(148, 163, 184, 0.15)';
        baseWeight = 0.5;
        baseFill = 'transparent';
        baseOpac = 0;
      } else {
        baseColor = 'rgba(250, 204, 21, 0.5)';
        baseFill = 'rgba(250, 204, 21, 0.15)';
      }

      return {
        color: isSelected ? '#3b82f6' : baseColor,
        weight: isSelected ? 3 : baseWeight,
        dashArray: isSelected ? '6,6' : null,
        fillColor: baseFill,
        fillOpacity: baseOpac,
        interactive: true
      };
    },
    onEachFeature: function(feature, layer) {
      layer.on('click', function(e) {
        L.DomEvent.stopPropagation(e);
        const id = feature.properties.gridId;
        const currentCoords = getCurrentCoords();
        const currentId = getCurrentRuta(currentCoords[0], currentCoords[1]);
        
        if (id === currentId || selectedRutaId === id) {
          selectedRutaId = null;
        } else {
          selectedRutaId = id;
          if (!currentRutaVisible) toggleCurrentRuta();
        }
        updateDisplay();
        refreshGridStyles();
      });
    }
  }).addTo(map);
}

function updateKPI() {
  if (!rookData || !gridData) return;
  const totalGrids = gridData.features.length;
  const inventoried = rookData.grids ? Object.keys(rookData.grids).length : 0;
  const pct = ((inventoried / totalGrids) * 100).toFixed(1);
  
  document.getElementById('kpiVal').textContent = `${inventoried}/${totalGrids}`;
  document.getElementById('kpiPct').textContent = `${pct}%`;
  document.getElementById('kpiBar').style.width = `${pct}%`;
  document.getElementById('kpiOverlay').classList.add('visible');
}
</script>
